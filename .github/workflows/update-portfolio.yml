name: update-portfolio

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: update-portfolio
  cancel-in-progress: false

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install VHS + ffmpeg + jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl unzip gnupg fontconfig jq

          curl -fsSL https://repo.charm.sh/apt/gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg

          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list

          sudo apt-get update -qq
          sudo apt-get install -y vhs

          vhs --version

      - name: Install ttyd
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ttyd

      - name: Install JetBrainsMono Nerd Font
        run: |
          mkdir -p ~/.local/share/fonts

          curl -fsSL \
            "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip" \
            -o /tmp/jbm.zip

          unzip -q /tmp/jbm.zip -d ~/.local/share/fonts
          fc-cache -f

      - name: Clean previous output
        run: rm -f portfolio.png

      - name: Render portfolio
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TERM: xterm-256color
          COLUMNS: "110"
        run: |
          vhs portfolio.tape

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add portfolio.png

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update portfolio $(date -u +%Y-%m-%d)"

          git pull --rebase origin main
          git push origin main